db.url=jdbc:postgresql://prod-server:5432/weatherApp
db.username=${DB_USERNAME}
db.password=${DB_PASSWORD}
db.driver=org.postgresql.Driver

# Hibernate
hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
hibernate.show_sql=false
hibernate.format_sql=false
hibernate.hbm2ddl.auto=validate
hibernate.current_session_context_class=org.springframework.orm.hibernate5.SpringSessionContext
hibernate.scan_packages=io.github.xcvqqz.weather_app.entity

# HikariCP
hikari.maximumPoolSize=50
hikari.minimumIdle=10
hikari.idleTimeout=300000
hikari.connectionTimeout=30000
hikari.maxLifetime=1800000
hikari.leakDetectionThreshold=60000

# Thymeleaf
thymeleaf.cache=true
thymeleaf.prefix=/WEB-INF/templates/
thymeleaf.suffix=.html

# Flyway
flyway.locations=classpath:db/migration

# Scheduler
cleanup.cron.expression=0 0 * * * *
zone.cron.expression=Europe/Moscow

# Weather API
app.key=${WEATHER_API_KEY}
weather.url=https://api.openweathermap.org/data/2.5/weather
geo.url=https://api.openweathermap.org/geo/1.0/direct