<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
        <meta charset="UTF-8">
        <title>Weather Viewer – Sign Up</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
        <div class="row justify-content-center">
                <div class="col-6">
                        <div class="weather-logo"></div>
                </div>
        </div>

        <h2 class="text-center mb-5">Sign Up</h2>

        <div class="row justify-content-center">
                <div class="col-12 col-lg-4 col-md-6 col-sm-12">
                        <form th:action="@{/sign-up}" th:method="POST" th:object="${user}" class="mt-4">
                                <div class="mb-3">
                                        <label for="login" class="form-label">Username</label>
                                        <input type="text" class="form-control" th:field="*{login}" id="login" required/>
                                        <span th:if="${#fields.hasErrors('login')}"
                                              th:errors="*{login}"
                                              style="color: red; font-size: 0.875em;"></span>
                                </div>
                                <div class="mb-3">
                                        <label for="password" class="form-label">Password</label>
                                        <input type="password" class="form-control" th:field="*{password}" id="password" required/>
                                        <span th:if="${#fields.hasErrors('password')}"
                                              th:errors="*{password}"
                                              style="color: #ef0a0a; font-size: 0.875em;"></span>
                                </div>
                                <div class="mb-3">
                                        <label for="confirmPassword" class="form-label">Repeat password</label>
                                        <input type="password" class="form-control" name="confirmPassword" id="confirmPassword" required/>
                                        <span th:if="${#fields.hasErrors('confirmPassword')}"
                                              th:errors="*{confirmPassword}"
                                              style="color: red; font-size: 0.875em;"></span>
                                </div>

                                <div th:if="${global_error}" class="alert alert-danger mt-3">
                                        Ошибка: <span th:text="${global_error}"></span>
                                </div>

                                <button type="submit" class="btn btn-primary w-100 mt-3">Sign Up</button>
                                <p class="mt-2 text-center">Already have an account? <a th:href="@{/sign-in}">Sign in here</a></p>
                        </form>
                </div>
        </div>
</div>

</body>
</html>
