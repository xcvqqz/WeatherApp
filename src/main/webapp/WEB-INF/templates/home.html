<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <title>Weather Viewer – Homepage</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar navbar-light bg-light">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">
            <img th:src="@{/images/oblachko.png}"
                 alt="" width="30" height="24"
                 class="d-inline-block align-text-top">
            Weather Tracker
        </a>
        <div class="d-flex align-items-center" th:if="${user != null}">
            <span class="navbar-text me-3" th:text="${user.login}">Имя пользователя</span>
            <a th:href="@{/logout}" class="btn btn-outline-danger">Sign out</a>
        </div>
    </div>
</nav>

<section id="page-content">
    <div class="container mt-4">

        <form th:action="@{/search-results}" method="GET">
            <div class="d-flex my-4">
                <div class="input-group location-search-input-group me-3">
                    <input class="form-control"
                           type="text"
                           name="location"
                           th:placeholder="'Введите название локации'"
                           required>
                    <button class="btn btn-outline-secondary btn-sm clear-input-button" type="button"
                            onclick="this.previousElementSibling.value=''">
                        &times;
                    </button>
                </div>
                <button class="btn btn-outline-success" type="submit">Search</button>
            </div>

            <div th:if="${errors != null && !errors.isEmpty()}" class="alert alert-danger">
                <span th:each="error : ${errors}" th:text="${error.defaultMessage}"></span>
            </div>

            <div th:if="${global_error}" class="alert alert-danger">
                Ошибка: <span th:text="${global_error}"></span>
            </div>
        </form>

        <div>
            <p th:if="${weathers.isEmpty()}" class="text-muted">No weather data available</p>

            <div class="row">
                <div class="col-12 col-lg-3 col-md-6 mb-4"
                     th:each="weather : ${weathers}">
                    <div class="card h-100 position-relative weather-card">

                        <div class="position-absolute weather-card-delete-form">
                            <form th:action="@{/delete/{id}(id=${weather.id})}" method="post">
                                <button class="btn-close"
                                        aria-label="Delete"
                                        type="submit"
                                        onclick="return confirm('Вы уверены, что хотите удалить запись о погоде для города ' +
                                            this.closest('.card').querySelector('h3').textContent + '?')">
                                </button>
                            </form>
                        </div>

                        <img class="card-img-top img-fluid"
                             th:src="@{'https://openweathermap.org/img/wn/' + ${weather.icon()} + '@4x.png'}"
                             alt="Weather icon">

                        <div class="card-body d-flex flex-column">
                            <h1 class="card-text" th:text="${weather.temp()} + '°C'">Temp</h1>
                            <h3 class="card-title"
                                th:text="${weather.city()} + ', ' + ${weather.country()}">City, Country</h3>
                            <p class="card-text mb-1">
                                Feels like <span th:text="${weather.feelsLike()}">FeelsLike</span>°C.
                                <span th:text="${weather.description()}">Description</span>
                            </p>
                            <p class="card-text mb-1">
                                Humidity: <span th:text="${weather.humidity()}">Humidity</span>%
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</section>

<footer class="d-flex flex-wrap justify-content-between align-items-center py-3 mt-4 border-top">
    <div class="px-4">
        <span>© Weather Viewer, project from
            <a href="https://zhukovsd.github.io/java-backend-learning-course/">zhukovsd/java-backend-learning-course</a> roadmap.
        </span>
    </div>
</footer>

</body>
</html>
