<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Weather Viewer – Homepage</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Навигационная панель -->
<nav class="navbar navbar-light bg-light">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">
            <img src="images/weather-app.png" alt="" width="30" height="24" class="d-inline-block align-text-top">
            Weather Tracker
        </a>
        <div class="d-flex align-items-center">
            <span th:if="${user != null}" class="navbar-text me-3" th:text="${user.login}">username</span>
            <a th:href="@{/logout}" class="btn btn-outline-danger">Sign out</a>
        </div>
    </div>
</nav>

<section id="page-content">
    <div class="container mt-4">

        <!-- Форма поиска локации -->
        <div class="d-flex my-4">
            <form th:action="@{/locations/search-results}" method="GET" class="d-flex w-100">
                <div class="input-group location-search-input-group me-3">
                    <input class="form-control"
                           type="text"
                           name="location"
                           th:placeholder="'Введите название локации'"
                           required>
                    <button class="btn btn-outline-secondary btn-sm clear-input-button" type="button"
                            onclick="this.previousElementSibling.value=''">
                        &times;
                    </button>
                </div>
                <button class="btn btn-outline-success" type="submit">Search</button>
            </form>
        </div>

        <!-- Блок ошибок поиска -->
        <div th:if="${errors != null && !errors.isEmpty()}" class="alert alert-danger">
            <span th:each="error : ${errors}" th:text="${error.defaultMessage}"></span>
        </div>
        <div th:if="${global_error}" class="alert alert-danger">
            <span th:text="${global_error}"></span>
        </div>

        <!-- Сообщение, если нет данных о погоде -->
        <div th:if="${weathers == null || weathers.isEmpty()}" class="alert alert-info text-center">
            No weather data available
        </div>

        <!-- Карточки погоды -->
        <div th:if="${weathers != null && !weathers.isEmpty()}">
            <div class="row">
                <div th:each="weather : ${weathers}" class="col-12 col-lg-3 col-md-6 mb-4">
                    <div class="card h-100 position-relative weather-card">

                        <!-- Кнопка удаления -->
                        <div class="position-absolute weather-card-delete-form">
                            <form th:action="@{/locations/delete/{id}(id=${weather.id})}" method="post">
                                <button type="submit"
                                        class="btn-close"
                                        aria-label="Delete"
                                        th:attr="onclick='return confirm(\'Вы уверены, что хотите удалить запись о погоде для города ' + this.closest(\'.card\').querySelector(\'.card-title\').textContent + \'?\')'">
                                </button>
                            </form>
                        </div>

                        <!-- Иконка погоды -->
                        <img class="card-img-top img-fluid"
                             th:src="@{'https://openweathermap.org/img/wn/' + ${weather.icon} + '@4x.png'}"
                             th:alt="${weather.description()}"
                             src="https://openweathermap.org/img/wn/01n@4x.png"
                             alt="Weather icon">

                        <div class="card-body d-flex flex-column">
                            <!-- Температура -->
                            <h1 class="card-text" th:text="${weather.temp() + '°C'}">7°C</h1>

                            <!-- Название города и страна -->
                            <h3 class="card-title" th:text="${weather.city() + ', ' + weather.country()}">Tbilisi, GE</h3>

                            <!-- Ощущается как и описание -->
                            <p class="card-text mb-1">
                                Feels like <span th:text="${weather.feelsLike()}">2</span>°C.
                                <span th:text="${weather.description()}">Clear sky</span>
                            </p>

                            <!-- Влажность -->
                            <p class="card-text mb-1">
                                Humidity: <span th:text="${weather.humidity()}">70</span>%
                            </p>

                            <!-- Координаты (скрытая информация) -->
                            <p class="card-text mb-1 small text-muted">
                                Lon: <span th:text="${weather.lon()}">0</span>,
                                Lat: <span th:text="${weather.lat()}">0</span>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</section>
