<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <title>Авторизация пользователя</title>
</head>
<body>


<form th:action="@{/sign-in}" th:method="POST" th:object=${user}>

    <label for="login">Login</label>
    <input type="text" th:field="*{login}" id="login"/>
    <span th:if="${#fields.hasErrors('login')}" th:errors="*{login}"
          style="color: red;"></span>

    <br/>
    <label for="password">Password</label>
    <input type="password" th:field="*{password}" id="password"/>
    <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}"
          style="color: red;"></span>
<br>
    <input type="submit" value="Войти в аккаунт"/>

    <div th:if="${password_mismatch_error != null && !password_mismatch_error.isEmpty()}"
         class="invalid-feedback">
            <span th:each="error : ${password_mismatch_error}"
                  th:text="${error.defaultMessage}"></span>
    </div>

    <div th:if="${global_error}" class="alert alert-danger">
        Ошибка: <span th:text="${global_error}"></span>
    </div>



</form>


Don't have an account? <a th:href="@{/sign-up}">Sign up here </a>


</body>
</html>
