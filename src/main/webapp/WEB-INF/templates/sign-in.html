<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Weather Viewer – Sign In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-6">
            <div class="weather-logo"></div>
        </div>
    </div>

    <h2 class="text-center mb-5">Sign In</h2>

    <div class="row justify-content-center">
        <div class="col-12 col-lg-4 col-md-6 col-sm-12">

            <!-- Глобальная ошибка -->
            <div th:if="${global_error}" class="alert alert-danger text-center">
                <span th:text="${global_error}"></span>
            </div>

            <form th:action="@{/sign-in}" th:method="POST" th:object="${user}" class="mt-4">

                <!-- Поле Login -->
                <div class="mb-3">
                    <label for="login" class="form-label">Login</label>
                    <input type="text"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('login')} ? 'is-invalid' : ''"
                           id="login"
                           th:field="*{login}"
                           required/>
                    <div th:if="${#fields.hasErrors('login')}" class="invalid-feedback">
                        <span th:errors="*{login}"></span>
                    </div>
                </div>

                <!-- Поле Password -->
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('password') || (password_mismatch_error != null && !password_mismatch_error.isEmpty())} ? 'is-invalid' : ''"
                           id="password"
                           th:field="*{password}"
                           required/>
                    <div th:if="${#fields.hasErrors('password')}" class="invalid-feedback">
                        <span th:errors="*{password}"></span>
                    </div>
                    <div th:if="${password_mismatch_error != null && !password_mismatch_error.isEmpty()}" class="invalid-feedback d-block">
                        <span th:each="error : ${password_mismatch_error}" th:text="${error.defaultMessage}"></span>
                    </div>
                </div>

                <input type="hidden" name="redirect_to" value="http://localhost/"/>

                <button type="submit" class="btn btn-primary w-100 mt-3">Sign In</button>
                <p class="mt-2 text-center">Don't have an account? <a th:href="@{/sign-up}">Sign up here</a></p>
            </form>
        </div>
    </div>
</div>

</body>
</html>
