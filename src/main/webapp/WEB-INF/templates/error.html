<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Weather Viewer - Error</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container text-center mt-5">
    <h1 class="display-4">Oops! Something Went Wrong</h1>
    <p class="lead">We're sorry, but an unexpected error has occurred. Please try again later.</p>


    <div class="alert alert-danger mx-auto" style="max-width: 400px;">
        <p class="mb-1"><strong>Status:</strong> <span th:text="${error.status}">STATUS</span></p>
        <p class="mb-0"><strong>Error:</strong> <span th:text="${error.name}">NAME</span></p>
    </div>


    <div class="mt-4">
        <a class="btn btn-primary me-2" th:href="@{/home}">Go to Home</a>
        <a class="btn btn-outline-secondary" th:href="@{/sign-in}">Sign In</a>
    </div>
</div>

</body>
</html>
