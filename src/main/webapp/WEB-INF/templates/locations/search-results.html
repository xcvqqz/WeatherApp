<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Результаты поиска</title>
</head>
<body>

<form th:action="@{/locations/search-result}" method="get">
    <input name="search" th:value="${search}" placeholder = "Введите локацию">
    <button type="submit">Найти</button>
</form>


<tr th:each = "location : ${locations}">
    <td th:text="${location.name}"></td>
    <td th:text="${location.country}"></td>
</tr>


</body>
</html>
