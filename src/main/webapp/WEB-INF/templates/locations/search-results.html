<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Weather Viewer – Search Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Навигационная панель -->
<nav class="navbar navbar-light bg-light">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/home}">
            <img src="images/weather-app.png" alt="" width="30" height="24" class="d-inline-block align-text-top">
            Weather Tracker
        </a>
        <div class="d-flex align-items-center">
            <span th:if="${user != null}" class="navbar-text me-3" th:text="${user.login}">username</span>
            <a th:href="@{/logout}" class="btn btn-outline-danger">Sign out</a>
        </div>
    </div>
</nav>

<section id="page-content">
    <div class="container mt-4">

        <!-- Форма поиска -->
        <div class="d-flex my-4">
            <form th:action="@{/locations/search-results}" method="get" class="d-flex w-100">
                <div class="input-group location-search-input-group me-3">
                    <input class="form-control"
                           type="text"
                           name="location"
                           th:value="${location}"
                           placeholder="Enter location"
                           required>
                    <button class="btn btn-outline-secondary btn-sm clear-input-button" type="button"
                            onclick="this.previousElementSibling.value=''">
                        &times;
                    </button>
                </div>
                <button class="btn btn-outline-success" type="submit">Search</button>
            </form>
        </div>

        <!-- Блок ошибок -->
        <div th:if="${errors != null && !errors.isEmpty()}" class="alert alert-danger">
            <span th:each="error : ${errors}" th:text="${error.defaultMessage}"></span>
        </div>
        <div th:if="${global_error}" class="alert alert-danger">
            <span th:text="${global_error}"></span>
        </div>

        <!-- Заголовок секции -->
        <h2 th:if="${locations != null && !locations.isEmpty()}">Locations:</h2>

        <!-- Сообщение, если ничего не найдено -->
        <div th:if="${locations == null || locations.isEmpty()}" class="alert alert-info text-center">
            No locations found
        </div>

        <!-- Карточки локаций -->
        <div th:if="${locations != null && !locations.isEmpty()}">
            <div class="row">
                <div th:each="location : ${locations}" class="col-12 col-lg-3 col-md-6 mb-4">
                    <div class="card h-100">
                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title" th:text="${location.name}">San Francisco</h5>
                            <p class="card-text mb-1">Latitude: <span th:text="${location.lat}">37.7790262</span></p>
                            <p class="card-text mb-1">Longitude: <span th:text="${location.lon}">-122.419906</span></p>
                            <p class="card-text mb-1">Country: <span th:text="${location.country}">US</span></p>
                            <p th:if="${location.state != null}" class="card-text mb-3">State: <span th:text="${location.state}">California</span></p>
                            <p th:unless="${location.state != null}" class="card-text mb-3"></p>
                            <div class="mt-auto">
                                <form th:action="@{/locations/add}" method="post">
                                    <input type="hidden" name="name" th:value="${location.name}"/>
                                    <input type="hidden" name="lat" th:value="${location.lat}"/>
                                    <input type="hidden" name="lon" th:value="${location.lon}"/>
                                    <input type="hidden" name="country" th:value="${location.country}"/>
                                    <button type="submit" class="btn btn-primary w-100">Add</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</section>

<!-- Футер -->
<footer class="d-flex flex-wrap justify-content-between align-items-center py-3 mt-4 border-top">
    <div class="px-4">
        <span>© Weather Viewer, project from <a href="https://zhukovsd.github.io/java-backend-learning-course/">zhukovsd/java-backend-learning-course</a> roadmap.</span>
    </div>
</footer>

</body>
</html>
