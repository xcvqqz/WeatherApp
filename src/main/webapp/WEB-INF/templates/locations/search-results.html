<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Результаты поиска</title>
</head>
<body>


<a th:href="@{/logout}">Sign out</a>

<form th:action="@{/locations/search-results}" method="get">
    <input name="location" th:value="${location}" placeholder="Введите локацию">
    <button type="submit">Найти</button>
</form>

<table>
    <thead>
    <tr>
        <th>Название</th>
        <th>Широта</th>
        <th>Долгота</th>
        <th>Страна</th>
        <th>Действие</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="location : ${locations}">
        <td th:text="${location.name}"></td>
        <td th:text="${location.lat}"></td>
        <td th:text="${location.lon}"></td>
        <td th:text="${location.country}"></td>
        <td>
            <form th:action="@{/locations/add}" method="post">
                <input type="hidden" name="name" th:value="${location.name}"/>
                <input type="hidden" name="lat" th:value="${location.lat}"/>
                <input type="hidden" name="lon" th:value="${location.lon}"/>
                <input type="hidden" name="country" th:value="${location.country}"/>
                <button type="submit">Add</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
